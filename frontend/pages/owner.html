<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Owner Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Sora:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/css/styles.css" />
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  </head>
  <body>
    <main class="dashboard-layout">
      <header class="panel">
        <h1 id="ownerRestaurantName">Owner Dashboard</h1>
        <div class="toolbar">
          <a class="btn btn-light" href="../index.html">Home</a>
          <button id="logoutBtn" class="btn btn-dark">Logout</button>
        </div>
      </header>

      <section class="panel">
        <h2>Menu Management</h2>
        <form id="menuForm" class="grid-3">
          <input name="name" placeholder="Item Name" required />
          <input name="price" type="number" step="0.01" placeholder="Price" required />
          <input name="category" placeholder="Category" required />
          <input name="imageUrl" placeholder="Image URL" />
          <input name="description" placeholder="Description" />
          <button class="btn btn-primary" type="submit">Add Item</button>
        </form>
        <form id="menuEditForm" class="grid-3 hidden">
          <input name="itemId" type="hidden" />
          <input name="name" placeholder="Item Name" required />
          <input name="price" type="number" step="0.01" placeholder="Price" required />
          <input name="category" placeholder="Category" required />
          <input name="imageUrl" placeholder="Image URL" />
          <input name="description" placeholder="Description" />
          <button class="btn btn-dark" type="submit">Save Changes</button>
        </form>
        <div id="menuList"></div>
      </section>

      <section class="panel">
        <h2>Table & QR Management</h2>
        <form id="autoTableForm" class="inline-form">
          <input name="totalTables" type="number" min="1" max="500" placeholder="Total number of tables" required />
          <button class="btn btn-light" type="submit">Auto Generate Table 1..N</button>
        </form>
        <form id="tableForm" class="inline-form">
          <input name="tableNumber" placeholder="Table number (e.g., A1)" required />
          <button class="btn btn-primary" type="submit">Create Table</button>
        </form>
        <div id="tableList"></div>
      </section>

      <section class="panel">
        <h2>Kitchen Board (Pending / Preparing)</h2>
        <div id="kitchenOrders"></div>
      </section>

      <section class="panel">
        <h2>Staff Board (Ready Orders)</h2>
        <div id="readyOrders"></div>
      </section>

      <p id="ownerMessage" class="message"></p>
    </main>

    <footer class="brand-footer">Powered by Online Solutionzzz</footer>
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/common.js"></script>
    <script src="../assets/js/owner.js"></script>
  </body>
</html>
